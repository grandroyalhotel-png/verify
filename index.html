<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تایید رزرو — Grand Royal Hotel Batumi</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Vazirmatn', sans-serif;
      background: #0a0e17;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #12192a;
      border: 1px solid #2a3550;
      border-radius: 20px;
      max-width: 420px;
      width: 100%;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .logo {
      width: 140px;
      height: auto;
      margin: 0 auto 24px;
      display: block;
    }

    .hotel-name {
      color: #c89b4a;
      font-size: 1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 32px;
      opacity: 0.85;
    }

    /* ---- loading ---- */
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      color: #8a9ab8;
      font-size: 0.95rem;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #2a3550;
      border-top-color: #c89b4a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- input form (no code in URL) ---- */
    .input-section { display: none; }
    .input-section h2 { color: #f7f5ee; font-size: 1.1rem; margin-bottom: 20px; font-weight: 600; }
    .input-section input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid #2a3550;
      background: #0a0e17;
      color: #f7f5ee;
      font-size: 1.1rem;
      text-align: center;
      letter-spacing: 0.1em;
      outline: none;
      font-family: monospace;
      margin-bottom: 14px;
    }
    .input-section input:focus { border-color: #c89b4a; }
    .input-section button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: #c89b4a;
      color: #0a0e17;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Vazirmatn', sans-serif;
    }
    .input-section button:hover { background: #d4a855; }

    /* ---- result: valid ---- */
    .result-valid { display: none; }
    .seal {
      width: 90px; height: 90px;
      border-radius: 50%;
      border: 3px solid #2a9d5c;
      background: rgba(42,157,92,0.12);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 2.4rem;
    }
    .result-valid h2 { color: #2a9d5c; font-size: 1.25rem; margin-bottom: 8px; }
    .result-valid .sub { color: #8a9ab8; font-size: 0.85rem; margin-bottom: 28px; }

    .info-grid {
      background: #0a0e17;
      border-radius: 12px;
      padding: 20px;
      text-align: right;
      display: grid;
      gap: 14px;
    }
    .info-row { display: flex; justify-content: space-between; align-items: center; }
    .info-label { color: #8a9ab8; font-size: 0.82rem; }
    .info-value { color: #f7f5ee; font-size: 0.95rem; font-weight: 600; }
    .divider { border: none; border-top: 1px solid #2a3550; }

    .badge {
      margin-top: 24px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(42,157,92,0.15);
      border: 1px solid rgba(42,157,92,0.4);
      color: #2a9d5c;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 0.88rem;
      font-weight: 600;
    }

    /* ---- result: invalid ---- */
    .result-invalid { display: none; }
    .seal-invalid {
      width: 90px; height: 90px;
      border-radius: 50%;
      border: 3px solid #e05252;
      background: rgba(224,82,82,0.12);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 2.4rem;
    }
    .result-invalid h2 { color: #e05252; font-size: 1.2rem; margin-bottom: 10px; }
    .result-invalid p { color: #8a9ab8; font-size: 0.9rem; line-height: 1.7; }

    .footer-note {
      margin-top: 32px;
      color: #3a4a68;
      font-size: 0.75rem;
    }
  </style>
</head>

  <div class="hotel-name">Grand Royal · Batumi Hotel</div>

  <!-- Loading -->
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <span>در حال بررسی رزرو...</span>
  </div>

  <!-- Input form (when no code in URL) -->
  <div class="input-section" id="inputSection">
    <h2>کد رزرو را وارد کنید</h2>
    <input type="text" id="codeInput" placeholder="مثال: GR-1001" maxlength="20">
    <button onclick="checkCode()">بررسی رزرو</button>
  </div>

  <!-- Valid -->
  <div class="result-valid" id="resultValid">
    <div class="seal">✓</div>
    <h2>رزرو تایید شد</h2>
    <p class="sub">این واچر معتبر و اصل می‌باشد</p>
    <div class="info-grid">
      <div class="info-row">
        <span class="info-value" id="guestName">—</span>
        <span class="info-label">نام مهمان</span>
      </div>
      <hr class="divider">
      <div class="info-row">
        <span class="info-value" id="roomName">—</span>
        <span class="info-label">اتاق</span>
      </div>
      <hr class="divider">
      <div class="info-row">
        <span class="info-value" id="checkIn">—</span>
        <span class="info-label">تاریخ ورود</span>
      </div>
      <hr class="divider">
      <div class="info-row">
        <span class="info-value" id="checkOut">—</span>

  </div>

  <!-- Invalid -->
  <div class="result-invalid" id="resultInvalid">
    <div class="seal-invalid">✕</div>
    <h2 id="invalidTitle">واچر نامعتبر</h2>
    <p id="invalidMsg">این کد رزرو در سیستم هتل یافت نشد یا منقضی شده است.</p>
  </div>

  <div class="footer-note">grandroyalhotel-png.github.io/verify</div>
</div>

<script>
  const API = 'https://script.google.com/macros/s/AKfycbzhFy_qtNw6AT4I26n6X9_xnzTZ2y8OnydjGYE45nOlruoo_YQpzvv38DU7-w4ZANto/exec';

  function formatDate(d) {
    if (!d) return '—';
    const parts = String(d).split('-');
    if (parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
    return d;
  }

  function showValid(data) {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('resultValid').style.display = 'block';
    document.getElementById('guestName').textContent = data.name || '—';
    document.getElementById('roomName').textContent = data.room || '—';
    document.getElementById('checkIn').textContent = formatDate(data.check_in);
    document.getElementById('checkOut').textContent = formatDate(data.check_out);
  }

  function showInvalid(title, msg) {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('resultInvalid').style.display = 'block';
    document.getElementById('invalidTitle').textContent = title;
    document.getElementById('invalidMsg').textContent = msg;
  }

  function showInput() {
    document.getElementById('loader').style.display = 'none';
    document.getElementById('inputSection').style.display = 'block';
  }

  async function verify(code) {
    document.getElementById('loader').style.display = 'flex';
    document.getElementById('inputSection').style.display = 'none';
    document.getElementById('resultValid').style.display = 'none';
    document.getElementById('resultInvalid').style.display = 'none';
    try {
      const res = await fetch(`${API}?code=${encodeURIComponent(code)}`);
      const data = await res.json();
      if (data.valid) {
        showValid(data);
      } else {
        const expired = data.message && data.message.includes('پایان');
        showInvalid(
          expired ? 'اقامت پایان یافته' : 'واچر نامعتبر',
          expired
            ? 'مدت اقامت این مهمان در هتل به پایان رسیده است.'
            : 'این کد رزرو در سیستم هتل یافت نشد.'
        );
      }
    } catch(e) {
      showInvalid('خطا در اتصال', 'لطفاً اتصال اینترنت را بررسی کنید و دوباره امتحان کنید.');
    }
  }

  function checkCode() {
    const code = document.getElementById('codeInput').value.trim();
    if (!code) return;
    verify(code);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') checkCode();
  });

  // Read code from URL: ?code=GR-1001
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (code) {
    verify(code);
  } else {
    showInput();
  }
</script>
